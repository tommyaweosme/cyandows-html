<button style="position:absolute;left:0%;top:80%;width:50%;height:10%;" onclick="save(document.getElementById('textarea').value,document.getElementById('whattosaveas').value)">Save as</button>
<button style="position:absolute;left:50%;top:80%;width:50%;height:10%;" onclick="load(document.getElementById('whattosaveas').value)">Load</button>
<textarea style="position:absolute;left:0%;top:90%;width:100%;height:10%;" id="whattosaveas"></textarea>
<textarea style="position:absolute;left:0%;top:0%;width:100%;height:80%;" id="textarea"></textarea>
<script>
function save(x,y){
	localStorage.setItem("notepad-item-"+y,x);
}
function load(y){
 document.getElementById("textarea").value = localStorage.getItem("notepad-item-"+y);
}
</script>
