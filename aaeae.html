																																																																																																																																																																																																																																																																																																																																																																																																																																																																																						for(var i=0;i<h;i++){ for(var j=0;j<w;j++){ var id = String(i)+String(j); flagged[id] = false; // Initialize flag status to false

// Modified to handle click (reveal) and contextmenu (flag)
	toputintoplayfield += "<button id=\""+id+"\" style=\"position:absolute;height:"+(70/h)+"%;width:"+(80/w)+"%;top:"+(15+(i*(70/h)))+"%;left:"+(j*(80/w))+"%\" oncontextmenu=\"event.preventDefault(); toggleFlag('"+id+"');\" onclick=\"if(!flagged['"+id+"']){document.getElementById('"+id+"').innerHTML = '"+grid[i][j]+"';if('"+grid[i][j]+"'=='#'){document.getElementById('playfield').innerHTML = 'FAIL '+document.getElementById('playfield').innerHTML};}\"></button>"; } } document.getElementById("playfield").innerHTML = toputintoplayfield;

// Function to handle adding and removing flags
		window.toggleFlag = function(id) { var btn = document.getElementById(id); flagged[id] = !flagged[id]; btn.innerHTML = flagged[id] ? '🚩' : ''; } } </script>
