<script src="wordgen.js"></script>
<script>
function title(str) {
 return str.toLowerCase().replace(/\b\w/g, s => s.toUpperCase());
}
function mulberry32(a) {
	return function() {
		let t = a += 0x6D2B79F5;
		t = Math.imul(t ^ (t >>> 15), t | 1);
		t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
		return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
	}
}
function generatenewsite(x){
	const random = mulberry32(x);
	const hex = "#" + Math.floor(random() * 16777215).toString(16).padStart(6, "0")
	const hex2 = "#" + Math.floor(random() * 16777215).toString(16).padStart(6, "0")
	document.getElementById("browse").innerHTML =
"<div style='position:absolute;top:0%;left:0%;height:100%;width:100%;background-color:"+hex+";color:"+hex2+";'>" +
"<h1>"+title(getword(Math.floor(random()*wordcount())))+"</h1>"+
"<p>"+title(getword(Math.floor(random()*wordcount())))+" "+getword(Math.floor(random()*wordcount()))+" "+getword(Math.floor(random()*wordcount()))+" "+getword(Math.floor(random()*wordcount()))+" "+getword(Math.floor(random()*wordcount()))+" "+getword(Math.floor(random()*wordcount()))+" "+getword(Math.floor(random()*wordcount()))+" "+getword(Math.floor(random()*wordcount()))+" "+getword(Math.floor(random()*wordcount()))+" "+getword(Math.floor(random()*wordcount()))+".</p>" +
"<button onclick='generatenewsite("+1000000000*random()+")'>"+title(getword(Math.floor(random()*wordcount())))+" "+getword(Math.floor(random()*wordcount()))+" "+getword(Math.floor(random()*wordcount()))+" "+getword(Math.floor(random()*wordcount()))+"</button>" +
"<button onclick='generatenewsite("+1000000000*random()+")'>"+title(getword(Math.floor(random()*wordcount())))+" "+getword(Math.floor(random()*wordcount()))+" "+getword(Math.floor(random()*wordcount()))+" "+getword(Math.floor(random()*wordcount()))+"</button>" +
"</div>";
}
</script>
